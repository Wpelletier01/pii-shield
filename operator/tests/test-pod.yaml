apiVersion: v1
kind: Pod
metadata:
  name: test-app
  namespace: default
  labels:
    pii-shield.io/inject: "true"
  annotations:
    pii-shield.io/policy: "strict-policy"
    pii-shield.io/target-container: "busybox"
spec:
  containers:
  - name: busybox
    image: busybox:1.36
    command: ["/bin/sh", "-c"]
    args: ["while true; do echo '{\"email\": \"user@example.com\", \"msg\": \"failed login\"}' >> /var/log/log.txt; sleep 2; done"]
    volumeMounts:
    - name: logs-volume
      mountPath: /var/log/app
  volumes:
  - name: logs-volume
    emptyDir: {}
