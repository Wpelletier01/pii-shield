apiVersion: batch/v1
kind: Job
metadata:
  name: test-job
  namespace: default
spec:
  template:
    metadata:
      labels:
        pii-shield.io/inject: "true"
      annotations:
        pii-shield.io/policy: "strict-policy"
    spec:
      restartPolicy: Never
      containers:
      - name: main-task
        image: busybox:1.36
        command: ["/bin/sh", "-c"]
        args: 
        - |
          umask 0027
          mkdir -p /var/log/app
          echo '{"email": "job@example.com", "msg": "job started"}' >> /var/log/app/log.txt
          sleep 15
          echo '{"email": "job@example.com", "msg": "job finished"}' >> /var/log/app/log.txt
