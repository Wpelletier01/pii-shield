name: Publish SDKs

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # We need Go 1.26 or 1.24+ to use //go:wasmexport and wasip1 OS
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Compile WASM Kernel (FFI Layer)
        run: |
          GOOS=wasip1 GOARCH=wasm go build -buildmode=c-shared -o pii-shield-wasi.wasm cmd/wasm-ffi/main.go
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-binary
          path: pii-shield-wasi.wasm

  publish-npm:
    needs: build-wasm
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          
      - name: Download WASM Artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-binary
          path: sdks/node/
          
      - name: Publish NPM package
        working-directory: sdks/node
        run: |
          npm install
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          
  publish-pypi:
    needs: build-wasm
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Download WASM Artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-binary
          path: sdks/python/pii_shield/
          
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip build twine
          
      - name: Build python wheel and sdist
        working-directory: sdks/python
        run: python -m build
        
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdks/python/dist/
          password: ${{ secrets.PYPI_API_TOKEN }}
