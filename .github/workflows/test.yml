name: Test Coverage & SDKs

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  test-go:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'

    - name: Run Tests with Coverage
      run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./coverage.out
        flags: unittests

    - name: Compile WASM FFI
      run: GOOS=wasip1 GOARCH=wasm go build -buildmode=c-shared -o pii-shield-wasi.wasm cmd/wasm-ffi/main.go
      
    - name: Upload WASM artifact
      uses: actions/upload-artifact@v4
      with:
        name: compiled-wasm
        path: pii-shield-wasi.wasm

  test-node:
    needs: test-go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          
      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: compiled-wasm
          path: .
          
      - name: Test Node SDK
        working-directory: sdks/node
        run: node test.js

  test-python:
    needs: test-go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: compiled-wasm
          path: .
          
      - name: Install dependencies
        working-directory: sdks/python
        run: |
          python -m pip install --upgrade pip
          pip install wasmtime
          
      - name: Test Python SDK
        working-directory: sdks/python
        run: python test.py
