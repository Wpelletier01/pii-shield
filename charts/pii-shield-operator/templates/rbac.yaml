{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "pii-shield-operator.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pii-shield-operator.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "pii-shield-operator.fullname" . }}-leader-election-role
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pii-shield-operator.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "pii-shield-operator.fullname" . }}-manager-role
  labels:
    {{- include "pii-shield-operator.labels" . | nindent 4 }}
rules:
- apiGroups:
  - core.pii-shield.io
  resources:
  - piipolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - core.pii-shield.io
  resources:
  - piipolicies/finalizers
  verbs:
  - update
- apiGroups:
  - core.pii-shield.io
  resources:
  - piipolicies/status
  verbs:
  - get
  - patch
  - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "pii-shield-operator.fullname" . }}-metrics-auth-role
  labels:
    {{- include "pii-shield-operator.labels" . | nindent 4 }}
rules:
- apiGroups:
  - authentication.k8s.io
  resources:
  - tokenreviews
  verbs:
  - create
- apiGroups:
  - authorization.k8s.io
  resources:
  - subjectaccessreviews
  verbs:
  - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "pii-shield-operator.fullname" . }}-metrics-reader
  labels:
    {{- include "pii-shield-operator.labels" . | nindent 4 }}
rules:
- nonResourceURLs:
  - /metrics
  verbs:
  - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "pii-shield-operator.fullname" . }}-piipolicy-admin-role
  labels:
    {{- include "pii-shield-operator.labels" . | nindent 4 }}
rules:
- apiGroups:
  - core.pii-shield.io
  resources:
  - piipolicies
  verbs:
  - '*'
- apiGroups:
  - core.pii-shield.io
  resources:
  - piipolicies/status
  verbs:
  - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "pii-shield-operator.fullname" . }}-leader-election-rolebinding
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pii-shield-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "pii-shield-operator.fullname" . }}-leader-election-role
subjects:
- kind: ServiceAccount
  name: {{ include "pii-shield-operator.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "pii-shield-operator.fullname" . }}-manager-rolebinding
  labels:
    {{- include "pii-shield-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "pii-shield-operator.fullname" . }}-manager-role
subjects:
- kind: ServiceAccount
  name: {{ include "pii-shield-operator.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "pii-shield-operator.fullname" . }}-metrics-auth-rolebinding
  labels:
    {{- include "pii-shield-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "pii-shield-operator.fullname" . }}-metrics-auth-role
subjects:
- kind: ServiceAccount
  name: {{ include "pii-shield-operator.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
